name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyInstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller --noconfirm --onedir --windowed --name "SmartFileOrganizer" main.py

      - name: Install Inno Setup
        shell: powershell
        run: |
          curl -L -o innosetup.exe https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe
          Start-Process -FilePath innosetup.exe -Args "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Build Setup.exe with Inno Setup
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: SmartFileOrganizer-Setup
          path: dist\installer\SmartFileOrganizer_Setup_v1.0.0.exe
          retention-days: 30
