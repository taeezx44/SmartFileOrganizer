name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # กด build ด้วยตัวเองได้

jobs:
  build:
    runs-on: windows-latest   # ใช้ Windows จริงๆ

    steps:
      # 1. Checkout โค้ด
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyInstaller

      # 4. Build EXE ด้วย PyInstaller
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "SmartFileOrganizer" `
            --add-data "assets;assets" `
            main.py

      # 5. ดาวน์โหลด + ติดตั้ง Inno Setup
      - name: Install Inno Setup
        run: |
          curl -L -o innosetup.exe https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe
          Start-Process -FilePath innosetup.exe -Args "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
        shell: powershell

      # 6. Build Setup.exe ด้วย Inno Setup
      - name: Build Setup.exe with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: powershell

      # 7. Upload Setup.exe เป็น Artifact (ดาวน์โหลดได้)
      - name: Upload Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: SmartFileOrganizer-Setup
          path: dist\installer\SmartFileOrganizer_Setup_v1.0.0.exe
          retention-days: 30

      # 8. (Optional) สร้าง Release อัตโนมัติเมื่อ push tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\installer\SmartFileOrganizer_Setup_v1.0.0.exe
          generate_release_notes: true
